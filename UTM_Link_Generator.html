<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTM Link Generator</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #f5f5f5; margin: 0; min-height: 100vh; }
    input:focus { outline: none; }
    textarea:focus { outline: none; }
    ::selection { background: #e85d04; color: #fff; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback } = React;

    const REQUIRED_FIELDS = ["base_url", "source", "medium", "campaign"];

    const FIELD_META = {
      base_url:  { label: "Base URL",   placeholder: "https://example.com/page", required: true },
      source:    { label: "Source",     placeholder: "google",                   required: true },
      medium:    { label: "Medium",     placeholder: "cpc",                      required: true },
      campaign:  { label: "Campaign",   placeholder: "summer_sale",              required: true },
      term:      { label: "Term",       placeholder: "running+shoes",            required: false },
      content:   { label: "Content",    placeholder: "logolink",                 required: false },
    };

    function Field({ id, value, onChange, error }) {
      const meta = FIELD_META[id];
      return (
        <div className="flex flex-col gap-1">
          <label className="text-xs font-semibold tracking-widest uppercase text-neutral-400 flex items-center gap-1">
            {meta.label}
            {meta.required && <span className="text-[#e85d04]">*</span>}
            {!meta.required && <span className="text-neutral-600 normal-case tracking-normal font-normal">(isteğe bağlı)</span>}
          </label>
          <input
            type="text"
            value={value}
            onChange={e => onChange(id, e.target.value)}
            placeholder={meta.placeholder}
            className={`w-full bg-neutral-900 border rounded px-3 py-2.5 text-sm text-neutral-100 placeholder-neutral-600 transition-colors
              ${error ? "border-red-500 focus:border-red-400" : "border-neutral-700 focus:border-[#e85d04]"}`}
          />
          {error && (
            <span className="text-red-400 text-xs">{error}</span>
          )}
        </div>
      );
    }

    function App() {
      const [fields, setFields] = useState({
        base_url: "", source: "", medium: "", campaign: "", term: "", content: "",
      });
      const [errors, setErrors] = useState({});
      const [result, setResult] = useState("");
      const [copied, setCopied] = useState(false);

      const handleChange = useCallback((id, val) => {
        setFields(prev => ({ ...prev, [id]: val }));
        if (errors[id]) setErrors(prev => ({ ...prev, [id]: "" }));
      }, [errors]);

      const buildURL = useCallback(() => {
        const newErrors = {};
        REQUIRED_FIELDS.forEach(key => {
          if (!fields[key].trim()) newErrors[key] = "Bu alan zorunludur.";
        });

        if (Object.keys(newErrors).length > 0) {
          setErrors(newErrors);
          setResult("");
          return;
        }

        const params = new URLSearchParams();
        params.set("utm_source",   fields.source.trim());
        params.set("utm_medium",   fields.medium.trim());
        params.set("utm_campaign", fields.campaign.trim());
        if (fields.term.trim())    params.set("utm_term",    fields.term.trim());
        if (fields.content.trim()) params.set("utm_content", fields.content.trim());

        let base = fields.base_url.trim();
        const separator = base.includes("?") ? "&" : "?";
        setResult(`${base}${separator}${params.toString()}`);
        setErrors({});
      }, [fields]);

      const handleCopy = useCallback(async () => {
        if (!result) return;
        try {
          await navigator.clipboard.writeText(result);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch {
          const el = document.getElementById("utm-result");
          el.select();
          document.execCommand("copy");
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        }
      }, [result]);

      return (
        <div className="min-h-screen flex items-start justify-center px-4 py-16">
          <div className="w-full max-w-xl">
            {/* Header */}
            <div className="mb-10">
              <div className="flex items-center gap-2 mb-2">
                <span className="w-1 h-6 bg-[#e85d04] rounded-full inline-block" />
                <p className="text-xs font-semibold tracking-widest uppercase text-[#e85d04]">Pazarlama Aracı</p>
              </div>
              <h1 className="text-3xl font-bold tracking-tight text-neutral-100">UTM Link Generator</h1>
              <p className="text-sm text-neutral-500 mt-1">Kampanya takibi için UTM parametreli URL oluşturun.</p>
            </div>

            {/* Form */}
            <div className="flex flex-col gap-5">
              {Object.keys(FIELD_META).map(id => (
                <Field
                  key={id}
                  id={id}
                  value={fields[id]}
                  onChange={handleChange}
                  error={errors[id]}
                />
              ))}

              {/* Generate button */}
              <button
                onClick={buildURL}
                className="mt-2 w-full bg-[#e85d04] hover:bg-[#cf5204] active:bg-[#b84803] text-white font-semibold text-sm tracking-wide py-3 rounded transition-colors"
              >
                URL Oluştur
              </button>
            </div>

            {/* Result */}
            {result && (
              <div className="mt-8">
                <div className="h-px bg-neutral-800 mb-6" />
                <label className="text-xs font-semibold tracking-widest uppercase text-neutral-400 block mb-2">
                  Oluşturulan URL
                </label>
                <div className="flex gap-2 items-start">
                  <textarea
                    id="utm-result"
                    readOnly
                    value={result}
                    rows={3}
                    className="flex-1 bg-neutral-900 border border-neutral-700 rounded px-3 py-2.5 text-sm text-neutral-100 resize-none font-mono leading-relaxed"
                  />
                  <button
                    onClick={handleCopy}
                    className={`shrink-0 px-4 py-2.5 rounded text-sm font-semibold transition-colors
                      ${copied
                        ? "bg-green-700 text-green-100"
                        : "bg-neutral-800 hover:bg-neutral-700 text-neutral-200 border border-neutral-700"
                      }`}
                  >
                    {copied ? "Kopyalandı!" : "Kopyala"}
                  </button>
                </div>
              </div>
            )}

            <p className="mt-10 text-center text-xs text-neutral-700">* Zorunlu alanlar</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
